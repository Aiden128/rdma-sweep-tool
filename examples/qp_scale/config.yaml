test: ib_write_bw
duration: 2

server:
  # SSH target for the host that runs the perftest server process.
  host: rdma-server.example.com
  # RDMA/data-plane address passed to the client perftest command.
  address: rdma-server-data.example.com

client:
  # SSH target for the host that runs the perftest client.
  host: rdma-client.example.com

perftest:
  dir: /opt/perftest
  rdma_core_lib: ""
  tmp_dir: /tmp/rdma_sweep_{run_id}
  json_file: "{tmp_dir}/perftest_out.json"
  time_file: "{tmp_dir}/perftest_time.out"
  server_pid_file: "{tmp_dir}/perftest_server.pid"
  server_log_file: "{tmp_dir}/perftest_server.log"
  perf_data: "{tmp_dir}/perftest_perf.data"
  perf_pid_file: "{tmp_dir}/perftest_perf.pid"
  perf_record: false
  wait_timeout: 30
  default_port: 18515
  env: {}
  # Fixed perftest flags applied to every run.
  # These become ib_write_bw arguments, e.g. -p/-s/-d/-x/--force-link.
  fixed:
    port: 18515
    msg_size: 64
    device: mlx5_0
    # Replace with the RoCEv2 IPv4 GID index from show_gids.
    gid_index: 5
    force_link: Ethernet

ssh:
  sudo: true
  connect_timeout: 10
  options:
    - -o
    - BatchMode=yes
    - -o
    - StrictHostKeyChecking=accept-new

report:
  title: QP Scale RDMA Sweep
  subtitle: sanitized real two-node sweep - ib_write_bw

# Fixed RDMA/OS state checked read-only before any perftest process starts.
# These values are recorded as metadata; they are not forwarded as perftest args.
fixed:
  server:
    rdma_device: mlx5_0
    netdev: server-rdma-netdev
    mtu: 4200
  client:
    rdma_device: mlx5_0
    netdev: client-rdma-netdev
    mtu: 4200

sweep:
  - name: qp
    values: [1, 2, 4, 8, 16]
